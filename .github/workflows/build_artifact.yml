name: Build Resource Pack Artifact

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_NAME: GTNH-Guide-Pack

jobs:
  build-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute artifact metadata
        shell: bash
        run: |
          REF_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SAFE_REF="$(echo "${REF_NAME}" | tr '/:' '--')"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "ZIP_NAME=${PACKAGE_NAME}-${SAFE_REF}-${SHORT_SHA}.zip" >> "$GITHUB_ENV"

      - name: Build resource pack archive
        shell: bash
        run: |
          rm -rf package-root
          mkdir -p package-root
          cp -r assets package-root/
          cp pack.mcmeta package-root/
          cp pack.png package-root/
          cp README.md package-root/
          cp LICENSE.txt package-root/
          cd package-root
          zip -r "../${ZIP_NAME}" ./*

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error
