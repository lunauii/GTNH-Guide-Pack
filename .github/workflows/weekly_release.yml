name: Weekly Release Build

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  PACKAGE_NAME: GTNH-Guide-Pack

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute build metadata
        shell: bash
        run: |
          echo "BUILD_DATE=$(date -u +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "TAG_NAME=weekly-$(date -u +'%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "ZIP_NAME=${PACKAGE_NAME}-$(date -u +'%Y-%m-%d').zip" >> "$GITHUB_ENV"

      - name: Build resource pack archive
        shell: bash
        run: |
          rm -rf package-root
          mkdir -p package-root
          cp -r assets package-root/
          cp pack.mcmeta package-root/
          cp pack.png package-root/
          cp README.md package-root/
          cp LICENSE.txt package-root/
          cd package-root
          zip -r "../${ZIP_NAME}" ./*

      - name: Create weekly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Weekly Build ${{ env.BUILD_DATE }}
          prerelease: false
          make_latest: true
          files: ${{ env.ZIP_NAME }}
